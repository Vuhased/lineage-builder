name: Build LineageOS 23.2 for Sweet with BuildBuddy RBE

on:
  workflow_dispatch: # Позволяет запускать сборку кнопкой с телефона

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Максимальное расширение дискового пространства сервера
    - name: Maximize Build Space
      uses: easimon/maximize-build-space@v10
      with:
        root-reserve-mb: 1024
        swap-size-mb: 512
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    # 2. Скачивание репозитория-манифеста
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 3. Установка пакетов компиляции
    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib \
        gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev \
        libelf-dev liblz4-tool libsdl1.2-dev libssl-dev libxml2 libxml2-utils \
        lzma pinentry-curses rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
        libncurses-dev lib32ncurses-dev python3 repo

    - name: Configure Git
      run: |
        git config --global user.name "Viktor"
        git config --global user.email "viktor@example.com"

    # 4. Инициализация исходников LineageOS
    - name: Initialize LineageOS Source
      run: |
        mkdir android && cd android
        repo init -u https://github.com/LineageOS/android.git -b lineage-18.1 --git-lfs --depth=1

    # 5. Клонирование репозиториев устройства sweet
    - name: Clone Device Specific Repositories
      run: |
        cd android
        git clone https://github.com/LineageOS/android_hardware_xiaomi.git -b lineage-18.1 hardware/xiaomi
        git clone https://github.com/TheMuppets/proprietary_vendor_xiaomi_sm6150-common.git -b lineage-18.1 vendor/xiaomi/sm6150-common
        git clone https://github.com/LineageOS/android_device_xiaomi_sweet.git -b lineage-18.1 device/xiaomi/sweet
        git clone https://github.com/LineageOS/android_device_xiaomi_sm6150-common.git -b lineage-18.0 device/xiaomi/sm6150-common
        git clone https://github.com/LineageOS/android_kernel_xiaomi_sm6150.git -b lineage-18.1 kernel/xiaomi/sm6150
        git clone https://github.com/TheMuppets/proprietary_vendor_xiaomi_sweet.git -b lineage-18.1 vendor/xiaomi/sweet

    # 6. Синхронизация кода с оптимизацией размера
    - name: Sync Source Code
      run: |
        cd android
        repo sync -c -j$(nproc) --force-sync --no-clone-bundle --no-tags --prune

    # 7. Подключение удаленной компиляции через BuildBuddy RBE
    - name: Setup BuildBuddy RBE Flags
      env:
        BB_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
      run: |
        cd android
        echo "build --bes_results_url=https://app.buildbuddy.io/invocation/" >> .bazelrc
        echo "build --bes_backend=grpcs://remote.buildbuddy.io" >> .bazelrc
        echo "common --remote_header=x-buildbuddy-api-key=$BB_KEY" >> .bazelrc
        echo "USE_RBE=true" >> build/envsetup.sh

    # 8. Финальный запуск сборки прошивки
    - name: Execute Build
      run: |
        cd android
        source build/envsetup.sh
        breakfast sweet
        mka bacon
