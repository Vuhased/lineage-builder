name: Build LineageOS 23.2 for Sweet with BuildBuddy RBE

on:
  workflow_dispatch: # Позволяет запускать сборку кнопкой с телефона

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib \
        gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev \
        libelf-dev liblz4-tool libsdl1.2-dev libssl-dev libxml2 libxml2-utils \
        lzma pinentry-curses rsync schedtool squashfs-tools xsltproc zip zlib1g-dev \
        lib32ncurses5-dev libncurses5 libncurses5-dev python3 repo

    - name: Configure Git
      run: |
        git config --global user.name "Viktor"
        git config --global user.email "viktor@example.com"

    - name: Initialize LineageOS Source
      run: |
        mkdir android && cd android
        # Инициализация ветки 23.2, которую ты скинул
        repo init -u https://github.com/LineageOS/android.git -b lineage-23.2 --git-lfs --depth=1

    - name: Clone Device Specific Repositories
      run: |
        cd android
        # Клонируем все деревья, хардвер, вендоров и ядро из твоего списка
        git clone https://github.com/LineageOS/android_hardware_xiaomi.git -b lineage-23.2 hardware/xiaomi
        git clone https://github.com/TheMuppets/proprietary_vendor_xiaomi_sm6150-common.git -b lineage-23.2 vendor/xiaomi/sm6150-common
        git clone https://github.com/LineageOS/android_device_xiaomi_sweet.git -b lineage-23.2 device/xiaomi/sweet
        git clone https://github.com/LineageOS/android_device_xiaomi_sm6150-common.git -b lineage-23.2 device/xiaomi/sm6150-common
        git clone https://github.com/LineageOS/android_kernel_xiaomi_sm6150.git -b lineage-23.2 kernel/xiaomi/sm6150
        git clone https://github.com/TheMuppets/proprietary_vendor_xiaomi_sweet.git -b lineage-23.2 vendor/xiaomi/sweet

    - name: Sync Source Code
      run: |
        cd android
        repo sync -c -j$(nproc) --force-sync --no-clone-bundle --no-tags

    - name: Setup BuildBuddy RBE Flags
      env:
        BB_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
      run: |
        cd android
        # Настройка Bazel / BuildBuddy RBE по гайду FossOnTop
        echo "build --bes_results_url=https://app.buildbuddy.io/invocation/" >> .bazelrc
        echo "build --bes_backend=grpcs://remote.buildbuddy.io" >> .bazelrc
        echo "common --remote_header=x-buildbuddy-api-key=$BB_KEY" >> .bazelrc
        
        # Переменная окружения для интеграции RBE в компиляцию Android
        echo "USE_RBE=true" >> build/envsetup.sh

    - name: Execute Build
      run: |
        cd android
        source build/envsetup.sh
        # Подготовка сборки конкретно под sweet (Redmi Note 10 Pro)
        breakfast sweet
        # Запуск компиляции прошивки
        mka bacon
